<!DOCTYPE html>
<html>

<head>
    <title>Favorites</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
            <a href="favorites.html">Favorites</a>
            <a href="community.html">Community</a>
            <a href="calendar.html">Calendar</a>
            <a href="aboutus.html">About Us</a>
        </div>

        <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <div class="container">
        <h1>Favorite Recipes ❤️</h1>
        <div id="favorites-feed" class="favorites-feed"></div>
    </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text" placeholder="Start typing..."></textarea>
            <button id="save-shopping-btn" class="save-list-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="shopping.js"></script>

    <script>
        function resolveImageUrl(imageUrl) {
            if (!imageUrl) return '';
            if (/^https?:\/\//i.test(imageUrl)) return imageUrl;
            return `http://localhost:3000${imageUrl.startsWith('/') ? imageUrl : `/${imageUrl}`}`;
        }

        // 🔽 Expand/collapse
        function toggleSection(btn) {
            const section = btn.nextElementSibling;
            section.classList.toggle("hidden");

            btn.textContent = section.classList.contains("hidden")
                ? btn.textContent.replace("▲", "▼")
                : btn.textContent.replace("▼", "▲");
        }

        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
            loadFavorites();
        });

        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            const feed = document.getElementById('favorites-feed');

            feed.innerHTML = '';

            if (favorites.length === 0) {
                feed.innerHTML = '<p>No favorite recipes yet.</p>';
                return;
            }

            favorites.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'card';

                // 🔽 INGREDIENTS
                let ingredientsHTML = "";
                if (recipe.ingredients && recipe.ingredients.length > 0) {
                    ingredientsHTML = recipe.ingredients.map((i, index) => `
                        <label>
                            <input type="checkbox" />
                            ${i.amount || ""} ${i.name || ""}
                        </label><br/>
                    `).join("");
                } else {
                    ingredientsHTML = "<p>No ingredients listed</p>";
                }

                // 🔽 INSTRUCTIONS
                let instructionsHTML = recipe.instructions
                    ? `<p>${recipe.instructions.replace(/\n/g, "<br/>")}</p>`
                    : "<p>No instructions provided</p>";

                let inner = `<h3>${recipe.title}</h3>`;

                if (recipe.image_url) {
                    inner += `
                        <img src="${resolveImageUrl(recipe.image_url)}" 
                            style="max-width:200px; max-height:200px; display:block; margin-bottom:10px;">
                    `;
                } else {
                    inner += `<p><em>No Picture Uploaded</em></p>`;
                }

                inner += `<p>${recipe.description}</p>`;

                if (recipe.estimated_time) {
                    inner += `<p><strong>Time:</strong> ${recipe.estimated_time}</p>`;
                }

                // 🔽 NEW EXPANDABLE SECTIONS
                inner += `
                    <button onclick="toggleSection(this)">Ingredients ▼</button>
                    <div class="section-content hidden">
                        ${ingredientsHTML}
                    </div>

                    <button onclick="toggleSection(this)">Instructions ▼</button>
                    <div class="section-content hidden">
                        ${instructionsHTML}
                    </div>
                `;

                inner += `
                    <button onclick="removeFavorite(${recipe.id})">
                        Remove ❤️
                    </button>
                `;

                card.innerHTML = inner;
                feed.appendChild(card);
            });
        }

        function removeFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

            favorites = favorites.filter(recipe => recipe.id !== id);

            localStorage.setItem('favorites', JSON.stringify(favorites));

            loadFavorites();
        }
    </script>

    <div class="zestify-corner-logo">
        <img src="../uploads/Zestify.png" alt="Zestify Logo">
    </div>

</body>

</html>
