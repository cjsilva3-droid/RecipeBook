<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zestify Calendar</title>
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <!-- NAVBAR (matches dashboard exactly) -->
    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
            <a href="favorites.html">Favorites</a>
            <a href="community.html">Community</a>
            <a href="calendar.html">Calendar</a>
            <a href="aboutus.html">About Us</a>
        </div>

        <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <!-- MAIN PAGE CONTENT -->
    <div class="meal-planner-container">

  <!-- LEFT: Calendar -->
<div class="calendar-section">

    <!-- Month Label -->
    <div class="month-nav">
    <button id="prevMonth" class="month-arrow">‹</button>
    <h2 id="monthLabel"></h2>
    <button id="nextMonth" class="month-arrow">›</button>
</div>
    <!-- Weekday Row -->
    <div class="weekday-row">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <!-- Calendar Grid -->
    <div id="calendarGrid" class="calendar-grid">
        <!-- JS will generate the days here -->
    </div>

</div>

        <!-- RIGHT: Recipe Search + List -->
        <div class="recipe-list-section">
            <input type="text" id="recipeSearch" placeholder="Search recipes...">

            <div id="recipeList" class="recipe-list"
                ondragover="event.preventDefault()">
            </div>
        </div>

    </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text" placeholder="Start typing..."></textarea>
            <button id="save-shopping-btn" class="save-list-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="calendar.js"></script>
    <script src="shopping.js"></script>

    <div class="zestify-corner-logo">
    <img src="../uploads/Zestify.png" alt="Zestify Logo">
</div>

</body>
</html>
