    <div class="container">

        <section class="hero">
    <h1 class="hero-title">Zestify</h1>
    <p class="hero-slogan"> 🍋 Let's get Zesty!🍋</p>
</section>

    <h2 class="section-title">Chef's Favorites</h2>

    <div id="featured-recipes" class="recipe-grid"></div>
</div>


        <hr>


    <script src="auth.js"></script>
    

    <script>

    document.addEventListener("DOMContentLoaded", () => {
    requireAuth();
    loadFeaturedRecipes();
});

async function loadFeaturedRecipes() {
    try {
        const res = await fetch("http://localhost:3000/recipes");
        const recipes = await res.json();

        // Shuffle + take 3
        const selected = recipes.sort(() => Math.random() - 0.5).slice(0, 3);

        const container = document.getElementById("featured-recipes");
        container.innerHTML = "";

        selected.forEach(r => {
            const card = document.createElement("div");
            card.className = "recipe-card";

            card.innerHTML = `
                <img src="${r.image_url}" alt="Recipe Image">
                <h3>${r.title}</h3>
                <p>${r.description.substring(0, 80)}...</p>
            `;

            card.onclick = () => {
                window.location.href = `recipe.html?id=${r.id}`;
            };

            container.appendChild(card);
        });

    } catch (err) {
        console.error("Error loading featured recipes:", err);
    }
}
</script>



<div class="zestify-corner-logo">
    <img src="../uploads/Zestify.png" alt="Zestify Logo">
</div>
