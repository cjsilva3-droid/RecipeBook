    <script>

const API_BASE_URL = 'http://localhost:3000';

function escapeHtml(text) {
    return text ? text.replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    }[m])) : '';
}

function escapeAttr(text) {
    return text ? text.replace(/["']/g, m => (m === '"' ? '&quot;' : '&#039;')) : '';
}

function toggleSection(btn) {
    btn.nextElementSibling.classList.toggle('hidden');
}

function buildIngredientsHtml(ingredients = []) {
    let list = ingredients;

    if (typeof list === 'string') {
        try {
            list = JSON.parse(list);
        } catch {
            list = [list];
        }
    }

    if (!Array.isArray(list) || !list.length) return '<p>No ingredients listed.</p>';

    return list.map(item => {
        if (typeof item === 'string') return escapeHtml(item);

        const amount = escapeHtml(item.amount || '');
        const name = escapeHtml(item.name || item.ingredient || '');
        const line = `${amount} ${name}`.trim();
        return line || 'Ingredient';
    }).join('<br>');
}

function formatAverageRating(recipe) {
    const parsed = Number(recipe.average_rating ?? recipe.avg_rating);
    if (!Number.isFinite(parsed) || parsed <= 0) return 'No ratings yet';

    const rounded = Math.max(1, Math.min(5, Math.round(parsed)));
    return '⭐'.repeat(rounded);
}

function toggleFavorite(recipe, event) {
    if (event) event.stopPropagation();

    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    const index = favorites.findIndex(f => f.id === recipe.id);

    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push(recipe);
    }

    localStorage.setItem('favorites', JSON.stringify(favorites));
    const isNowFavorited = favorites.some(f => f.id === recipe.id);
    document.querySelectorAll(`.recipe-favorite-btn[data-recipe-id="${recipe.id}"]`).forEach(btn => {
        btn.textContent = isNowFavorited ? '❤️' : '🤍';
    });
    loadDashboardAnalytics();
}

function openRecipeModal(recipe) {
    const modal = document.getElementById('recipe-modal');
    const modalBody = document.getElementById('recipe-modal-body');
    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    const isFavorited = favorites.some(f => f.id === recipe.id);

    modalBody.innerHTML = `
        <h3>${escapeHtml(recipe.title || '')}</h3>
        <img src="${resolveImageUrl(recipe.image_url || '/uploads/placeholder.png')}" class="recipe-card-image" alt="${escapeAttr(recipe.title || 'Recipe image')}">
        <p>${escapeHtml(recipe.description || 'No description provided.')}</p>
        <p><strong>Author:</strong> ${escapeHtml(recipe.author || 'Anonymous')}</p>
        <p class="recipe-average-rating"><strong>Average Rating:</strong> ${formatAverageRating(recipe)}</p>
        <p class="recipe-time"><strong>Time:</strong> ${escapeHtml(recipe.estimated_time || '')}</p>

        <button class="recipe-section-btn modal-section-btn" onclick="toggleSection(this)">Ingredients</button>
        <div class="section-content hidden">${buildIngredientsHtml(recipe.ingredients || [])}</div>

        <button class="recipe-section-btn modal-section-btn" onclick="toggleSection(this)">Instructions</button>
        <div class="section-content hidden">${escapeHtml(recipe.instructions || 'No instructions provided.').replace(/\n/g, '<br>')}</div>

        <button class="favorite-heart modal-favorite recipe-favorite-btn" id="modal-favorite-btn" data-recipe-id="${recipe.id}">${isFavorited ? '❤️' : '🤍'}</button>
    `;

    document.getElementById('modal-favorite-btn').onclick = (event) => toggleFavorite(recipe, event);
    modal.style.display = 'flex';
}

function closeRecipeModal() {
    document.getElementById('recipe-modal').style.display = 'none';
}

function resolveImageUrl(imageUrl) {
    if (!imageUrl) return `${API_BASE_URL}/uploads/placeholder.png`;
    if (/^https?:\/\//i.test(imageUrl)) return imageUrl;
    return `${API_BASE_URL}${imageUrl.startsWith('/') ? imageUrl : `/${imageUrl}`}`;
}

    document.addEventListener("DOMContentLoaded", () => {
    requireAuth();
    loadDashboardAnalytics();
    loadFeaturedRecipes();
});

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    if (rotationInterval) {
        clearInterval(rotationInterval);
    }
});

async function loadDashboardAnalytics() {
    const token = localStorage.getItem('token');
    let userRecipes = [];
    let allRecipes = [];
    let followers = [];

    function averageToStars(avg) {
        const value = Number(avg);
        if (!Number.isFinite(value) || value <= 0) return '☆☆☆☆☆';
        const rounded = Math.max(1, Math.min(5, Math.round(value)));
        return '★'.repeat(rounded) + '☆'.repeat(5 - rounded);
    }

    try {
        const res = await fetch(`${API_BASE_URL}/recipes/my`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
            userRecipes = await res.json();
        } else {
            console.warn('Could not fetch user recipes for analytics', await res.text());
        }
    } catch (err) {
        console.error('Error loading dashboard analytics recipes:', err);
    }

    try {
        const allRes = await fetch(`${API_BASE_URL}/recipes`);
        if (allRes.ok) {
            allRecipes = await allRes.json();
        }
    } catch (err) {
        console.error('Error loading dashboard analytics public recipes fallback:', err);
    }

    try {
        const followersRes = await fetch(`${API_BASE_URL}/follows/followers`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (followersRes.ok) {
            followers = await followersRes.json();
        } else {
            console.warn('Could not fetch followers for analytics', await followersRes.text());
        }
    } catch (err) {
        console.error('Error loading dashboard analytics followers:', err);
    }

    const allById = new Map((allRecipes || []).map(r => [r.id, r]));
    const mergedUserRecipes = (userRecipes || []).map(r => {
        if (r.average_rating != null || r.avg_rating != null) return r;
        const fallback = allById.get(r.id);
        return {
            ...r,
            average_rating: fallback ? (fallback.average_rating ?? fallback.avg_rating ?? 0) : 0
        };
    });

    const recipeCount = mergedUserRecipes.length;
    const avgRating = recipeCount
        ? (mergedUserRecipes.reduce((sum, r) => sum + Number(r.average_rating || 0), 0) / recipeCount)
        : 0;
    const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    const favoriteCount = Array.isArray(favorites) ? favorites.length : 0;
    const followerCount = Array.isArray(followers) ? followers.length : 0;

    document.getElementById('my-recipes-count').textContent = recipeCount;
    document.getElementById('avg-rating').textContent = averageToStars(avgRating);
    document.getElementById('favorited-count').textContent = favoriteCount;
    document.getElementById('followers-count').textContent = followerCount;
}

async function loadFeaturedRecipes() {
    try {
        const res = await fetch(`${API_BASE_URL}/recipes`);
        const allRecipes = await res.json();

        // Get 9 random recipes (3 sets of 3)
        const shuffled = allRecipes.sort(() => Math.random() - 0.5);
        const selectedRecipes = shuffled.slice(0, 9);

        const container = document.getElementById("featured-recipes");
        container.innerHTML = "";

        // Create carousel container
        const carousel = document.createElement("div");
        carousel.className = "recipe-carousel";
        container.appendChild(carousel);

        // Create three slides
        for (let slideIndex = 0; slideIndex < 3; slideIndex++) {
            const slide = document.createElement("div");
            slide.className = "recipe-slide";

            const startIndex = slideIndex * 3;
            const slideRecipes = selectedRecipes.slice(startIndex, startIndex + 3);

            slideRecipes.forEach(r => {
                const card = document.createElement("div");
                card.className = "recipe-card";

                card.innerHTML = `
                    <img src="${resolveImageUrl(r.image_url)}" alt="${escapeAttr(r.title || 'Recipe image')}">
                    <h3>${escapeHtml(r.title || '')}</h3>
                    <p>${escapeHtml((r.description || 'No description provided.').slice(0, 80))}${(r.description || '').length > 80 ? '...' : ''}</p>
                `;

                card.addEventListener('click', (event) => {
                    if (event.target.closest('button, a, input, textarea, select, label')) return;
                    openRecipeModal(r);
                });

                slide.appendChild(card);
            });

            carousel.appendChild(slide);
        }

        // Start rotation
        startRecipeRotation();

    } catch (err) {
        console.error("Error loading featured recipes:", err);
    }
}

// Global variable to store rotation interval
let rotationInterval;

function startRecipeRotation() {
    let currentSlide = 0;
    const carousel = document.querySelector('.recipe-carousel');
    const totalSlides = 3;

    // Set initial position
    carousel.style.transform = 'translateX(0)';

    rotationInterval = setInterval(() => {
        currentSlide = (currentSlide + 1) % totalSlides;

        // Add sliding animation - move by 100% each slide since each slide is full width
        carousel.style.transition = 'transform 0.8s ease-in-out';
        carousel.style.transform = `translateX(-${currentSlide * 100}%)`;

        // Load new recipes for the next cycle when we reach the last slide
        if (currentSlide === totalSlides - 1) {
            setTimeout(() => {
                loadNewRecipesForRotation();
            }, 800); // Wait for animation to complete
        }
    }, 5000);
}

async function loadNewRecipesForRotation() {
    try {
        const res = await fetch(`${API_BASE_URL}/recipes`);
        const allRecipes = await res.json();

        // Get 3 new random recipes
        const shuffled = allRecipes.sort(() => Math.random() - 0.5);
        const newRecipes = shuffled.slice(0, 3);

        const carousel = document.querySelector('.recipe-carousel');
        const firstSlide = carousel.children[0];

        // Update the first slide with new recipes (which will become visible after rotation)
        firstSlide.innerHTML = '';

        newRecipes.forEach(r => {
            const card = document.createElement("div");
            card.className = "recipe-card";

            card.innerHTML = `
                <img src="${resolveImageUrl(r.image_url)}" alt="${escapeAttr(r.title || 'Recipe image')}">
                <h3>${escapeHtml(r.title || '')}</h3>
                <p>${escapeHtml((r.description || 'No description provided.').slice(0, 80))}${(r.description || '').length > 80 ? '...' : ''}</p>
            `;

            card.addEventListener('click', (event) => {
                if (event.target.closest('button, a, input, textarea, select, label')) return;
                openRecipeModal(r);
            });

            firstSlide.appendChild(card);
        });

    } catch (err) {
        console.error("Error loading new recipes for rotation:", err);
    }
}

function callProtectedRoute() {
    const token = localStorage.getItem("token");

    fetch(`${API_BASE_URL}/profile`, {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
        .then(res => {
            if (!res.ok) throw new Error("Unauthorized");
            return res.json();
        })
        .then(data => {
            document.getElementById("authMessage").innerText =
                "Authorized! Welcome " + data.username;
        })
        .catch(() => {
            document.getElementById("authMessage").innerText =
                "Authorization failed. Please log in again.";
        });
}

document.getElementById('recipe-modal-close').addEventListener('click', closeRecipeModal);
document.getElementById('recipe-modal').addEventListener('click', (event) => {
    if (event.target.id === 'recipe-modal') closeRecipeModal();
});
</script>
