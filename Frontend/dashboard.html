<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

   <nav>
    <div>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
        <a href="favorites.html">Favorites</a>
        <a href="community.html">Community</a>
    </div>

    <div id="profile-menu">
        <button id="profile-btn" onclick="window.location.href='profile.html'">
            Account Settings
        </button>

        <div id="dropdown">
            <a href="profile.html">Edit Account</a>
            <a id="logout-btn">Logout</a>
            <a id="delete-btn" class="danger">Delete Account</a>
        </div>
    </div>
</nav>
    <div class="container">
        <h1>Recommended Recipes</h1>

        <div class="card">Recipe Example 1</div>
        <div class="card">Recipe Example 2</div>

        <hr>

        <h3>Test Authorization</h3>
        <button onclick="testAuth()">Test Authorization</button>
        <p id="authMessage"></p>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
        });

        function testAuth() {
            const token = localStorage.getItem("token");
            const messageEl = document.getElementById("authMessage");

            if (token) {
                messageEl.innerText = "You are logged in! Token found.";
                messageEl.className = "success";
            } else {
                messageEl.innerText = "You are not logged in. Please log in.";
                messageEl.className = "error";
            }
        }
    </script>

</body>

</html>
