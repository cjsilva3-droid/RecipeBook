    <script src="auth.js"></script>
    

    <script>

function resolveImageUrl(imageUrl) {
    if (!imageUrl) return '';
    if (/^https?:\/\//i.test(imageUrl)) return imageUrl;
    return `http://localhost:3000${imageUrl.startsWith('/') ? imageUrl : `/${imageUrl}`}`;
}

    document.addEventListener("DOMContentLoaded", () => {
    requireAuth();
    loadDashboardAnalytics();
    loadFeaturedRecipes();
});

async function loadDashboardAnalytics() {
    const token = localStorage.getItem('token');
    let userRecipes = [];

    try {
        const res = await fetch('http://localhost:3000/recipes/my', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
            userRecipes = await res.json();
        } else {
            console.warn('Could not fetch user recipes for analytics', await res.text());
        }
    } catch (err) {
        console.error('Error loading dashboard analytics recipes:', err);
    }

    const recipeCount = userRecipes.length;
    const avgRating = recipeCount ? (userRecipes.reduce((sum, r) => sum + Number(r.average_rating || 0), 0) / recipeCount) : 0;
    const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    const favoriteCount = Array.isArray(favorites) ? favorites.length : 0;

    document.getElementById('my-recipes-count').textContent = recipeCount;
    document.getElementById('avg-rating').textContent = avgRating.toFixed(1);
    document.getElementById('favorited-count').textContent = favoriteCount;
}

async function loadFeaturedRecipes() {
    try {
        const res = await fetch("http://localhost:3000/recipes");
        const recipes = await res.json();

        // Shuffle + take 3
        const selected = recipes.sort(() => Math.random() - 0.5).slice(0, 3);

        const container = document.getElementById("featured-recipes");
        container.innerHTML = "";

        selected.forEach(r => {
            const card = document.createElement("div");
            card.className = "recipe-card";

            card.innerHTML = `
                <img src="${resolveImageUrl(r.image_url)}" alt="Recipe Image">
                <h3>${r.title}</h3>
                <p>${r.description.substring(0, 80)}...</p>
            `;

            card.onclick = () => {
                window.location.href = 'community.html';
            };

            container.appendChild(card);
        });

    } catch (err) {
        console.error("Error loading featured recipes:", err);
    }
}

function callProtectedRoute() {
    const token = localStorage.getItem("token");

    fetch("http://localhost:3000/profile", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
        .then(res => {
            if (!res.ok) throw new Error("Unauthorized");
            return res.json();
        })
        .then(data => {
            document.getElementById("authMessage").innerText =
                "Authorized! Welcome " + data.username;
        })
        .catch(() => {
            document.getElementById("authMessage").innerText =
                "Authorization failed. Please log in again.";
        });
}
</script>
