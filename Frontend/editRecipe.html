<!DOCTYPE html>
<html>

<head>
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <nav>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
    </nav>

    <div class="container">
        <h2>Edit Recipe</h2>

        <!-- FORM (IMPORTANT) -->
        <form id="editRecipeForm">

            <label>Title:</label><br>
            <input type="text" id="title" placeholder="Recipe Title" required><br><br>

            <label>Description:</label><br>
            <textarea id="description" placeholder="Recipe Description" required></textarea><br><br>

            <label>Estimated Time:</label><br>
            <input type="text" id="estimated_time" placeholder="e.g. 20 minutes"><br><br>

            <button type="submit">Update Recipe</button>

        </form>
    </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text" placeholder="Start typing..."></textarea>
            <button id="save-shopping-btn" class="save-list-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="shopping.js"></script>
    <script src="editRecipe.js"></script>

</body>

</html>
