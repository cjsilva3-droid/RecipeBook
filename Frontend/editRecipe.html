<!DOCTYPE html>
<html>

<head>
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <nav>
        <a href="recipes.html">Back</a>
    </nav>

    <div class="container">
        <h2>Edit Recipe</h2>

        <form id="editRecipeForm">

            <label>Title (max 25):</label><br>
            <input type="text" id="title" maxlength="25" required><br><br>

            <label>Description (max 800):</label><br>
            <textarea id="description" maxlength="800" required></textarea><br><br>

            <label>Estimated Time:</label><br><br>
            <input type="text" id="estimated_time" placeholder="e.g. 20"><br><br>

            <label>Ingredients (comma separated):</label><br>
            <textarea id="ingredients" rows="8" cols="60" placeholder="e.g. eggs, milk, flour"></textarea>


            <br><br><label>Instructions:</label><br>
            <textarea id="instructions" rows="12" cols="60" required></textarea>


            <button type="submit">Update Recipe</button>

        </form>
    </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text"></textarea>
            <button id="save-shopping-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="shopping.js"></script>
    <script src="editRecipe.js"></script>

</body>

</html>
