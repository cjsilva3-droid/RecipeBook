<!DOCTYPE html>
<html>

<head>
    <title>Community</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <div>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
        <a href="favorites.html">Favorites</a>
        <a href="community.html">Community</a>
    </div>

    <div id="profile-menu">
        <button id="profile-btn" onclick="window.location.href='profile.html'">
            Account Settings
        </button>
    </div>
    </nav>

    <div class="container">
        <h1>Community Feed</h1>
        <div id="feed"></div>
    </div>


    <script src="auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
            loadFeed();
        });

        async function loadFeed() {
            try {
                const res = await fetch('/recipes');
                const recipes = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                recipes.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    let inner = `<h3>${r.title}</h3>`;

                    const imageUrl = r.image_url;

                    if (imageUrl) {
                        inner += `<img src="${imageUrl}" alt="Recipe image" style="max-width:200px; max-height:200px; display:block; margin-bottom:10px;" />`;
                    } else {
                        inner += `<p><em>No Picture Uploaded</em></p>`;
                    }

                    inner += `<p>${r.description}</p>`;
                    if (r.estimated_time) inner += `<p><strong>Time:</strong> ${r.estimated_time}</p>`;
                    inner += `<p><strong>Author:</strong> ${r.author || 'Anonymous'}</p>`;
                    inner += `<p><strong>Published:</strong> ${formatTimeAgo(r.created_at)}</p>`;
                    if (r.updated_at && new Date(r.updated_at).getTime() !== new Date(r.created_at).getTime()) {
                        inner += `<p><strong>Updated:</strong> ${formatTimeAgo(r.updated_at)}</p>`;
                    }
                    inner += `<p><strong>Rating:</strong> ${Number(r.average_rating).toFixed(1)} ⭐</p>`;
                    inner += `<p><strong>Comments:</strong> ${r.comment_count}</p>`;
                    inner += `<button onclick="commentRecipe(${r.id})">Comment</button> `;
                    inner += `<button onclick="rateRecipe(${r.id})">Rate</button>`;
                    card.innerHTML = inner;
                    feed.appendChild(card);
                });
            } catch (err) {
                console.error('Load feed error', err);
            }
        }

        function formatTimeAgo(value) {
            if (!value) return '';

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';

            // Compute MST time (UTC-7) to keep relative times consistent regardless of the user's local timezone
            const msOffset = 7 * 60 * 60 * 1000; // 7 hours
            const nowMst = Date.now() - msOffset;
            const dateMst = date.getTime() - msOffset;

            const seconds = Math.floor((nowMst - dateMst) / 1000);

            if (seconds < 60) {
                return `${seconds} second${seconds !== 1 ? 's' : ''} ago`;
            }

            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) {
                return `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
            }

            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            }

            const days = Math.floor(hours / 24);
            return `${days} day${days !== 1 ? 's' : ''} ago`;
        }

        async function commentRecipe(id) {
            const text = prompt('Enter your comment:');
            if (!text || !text.trim()) return;

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to comment.');
                return;
            }

            try {
                const res = await fetch(`/recipes/${id}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ comment_text: text.trim() })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Comment posted!');
                    loadFeed();
                } else {
                    alert(data.error || 'Failed to post comment');
                }
            } catch (err) {
                console.error('Post comment error', err);
                alert('Failed to post comment');
            }
        }

        async function rateRecipe(id) {
            const ratingStr = prompt('Rate this recipe (1-5):');
            if (!ratingStr) return;

            const rating = Number(ratingStr);
            if (!Number.isInteger(rating) || rating < 1 || rating > 5) {
                alert('Please enter a number between 1 and 5');
                return;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to rate.');
                return;
            }

            try {
                const res = await fetch(`/recipes/${id}/ratings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ rating })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Rating saved!');
                    loadFeed();
                } else {
                    alert(data.error || 'Failed to save rating');
                }
            } catch (err) {
                console.error('Save rating error', err);
                alert('Failed to save rating');
            }
        }
    </script>

</body>

</html>
