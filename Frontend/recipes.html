<!DOCTYPE html>
<html>

<head>
    <title>My Recipes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
        <a href="favorites.html">Favorites</a>
        <a href="community.html">Community</a>
        <button onclick="logout()">Logout</button>

            <div id="dropdown">
                <a href="profile.html">Edit Profile</a>
                <a id="logout-btn">Logout</a>
                <a id="delete-btn" class="danger">Delete Account</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <h1>My Recipes</h1>
        <button id="showCreate">Create Recipe</button>

        <!-- Create Form -->
        <div id="createForm" class="card" style="display:none; margin-top:20px;">
            <h3>New Recipe</h3>
            <form id="recipeForm">
                <label>Title (max 25):</label><br>
                <input type="text" id="title" maxlength="25" required><br>

                <label>Description (max 150):</label><br>
                <textarea id="description" maxlength="150" rows="4" required></textarea><br>

                <label>Estimated Time:</label><br>
                <input type="text" id="estimated_time"><br><br>

                <button type="submit">Submit</button>
                <button type="button" id="cancelCreate">Cancel</button>
            </form>
            <p id="formMessage"></p>
        </div>

        <div id="feed"></div>

    </div>

    <script src="auth.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
            loadFeed();

            const showBtn = document.getElementById('showCreate');
            const createForm = document.getElementById('createForm');
            const cancelBtn = document.getElementById('cancelCreate');

            showBtn.onclick = () => createForm.style.display = 'block';
            cancelBtn.onclick = () => createForm.style.display = 'none';

            document.getElementById('recipeForm').onsubmit = async (e) => {
                e.preventDefault();
                await submitRecipe();
            };
        });

        // LOAD ALL RECIPES
        async function loadFeed() {
            try {
                const res = await fetch('http://localhost:3000/recipes');
                const recipes = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                recipes.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let inner = `<h3>${r.title}</h3>`;
                    inner += `<p>${r.description}</p>`;

                    if (r.estimated_time) {
                        inner += `<p><strong>Time:</strong> ${r.estimated_time}</p>`;
                    }

                    inner += `<p><strong>Author:</strong> ${r.author || 'Anonymous'}</p>`;
                    inner += `<p><strong>Rating:</strong> ${Number(r.average_rating).toFixed(1)} *</p>`;
                    inner += `<p><strong>Comments:</strong> ${r.comment_count}</p>`;

                    // ✅ COMMENTS DISPLAY AREA
                    inner += `<div id="comments-${r.id}" class="comments-box">Loading comments...</div>`;

                    // Buttons
                    inner += `<button onclick="commentRecipe(${r.id})">Comment</button>`;
                    inner += `<button onclick="rateRecipe(${r.id})">Rate</button>`;
                    inner += `<button onclick="editRecipe(${r.id})">Edit</button>`;

                    card.innerHTML = inner;
                    feed.appendChild(card);

                    // ✅ LOAD COMMENTS FOR EACH RECIPE
                    loadComments(r.id);
                });

            } catch (err) {
                console.error('Load feed error', err);
            }
        }

        // LOAD COMMENTS
        async function loadComments(recipeId) {
            try {
                const res = await fetch(`http://localhost:3000/recipes/${recipeId}/comments`);
                const comments = await res.json();

                const container = document.getElementById(`comments-${recipeId}`);
                container.innerHTML = '';

                if (!comments.length) {
                    container.innerHTML = '<p>No comments yet.</p>';
                    return;
                }

                comments.forEach(c => {
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${c.username || 'User'}:</strong> ${c.comment_text}`;
                    container.appendChild(p);
                });

            } catch (err) {
                console.error("Load comments error", err);
            }
        }

        // ADD COMMENT
        async function commentRecipe(id) {
            const text = prompt('Enter your comment:');
            if (!text || !text.trim()) return;

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to comment.');
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ comment_text: text.trim() })
                });

                if (res.ok) {
                    alert('Comment posted!');
                    loadFeed(); // refresh everything
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to post comment');
                }

            } catch (err) {
                console.error(err);
                alert('Failed to post comment');
            }
        }

        // RATE
        async function rateRecipe(id) {
            const ratingStr = prompt('Rate this recipe (1-5):');
            if (!ratingStr) return;

            const rating = Number(ratingStr);
            if (!Number.isInteger(rating) || rating < 1 || rating > 5) {
                alert('Enter a number 1-5');
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/ratings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ rating })
                });

                if (res.ok) {
                    alert('Rating saved!');
                    loadFeed();
                }

            } catch (err) {
                console.error(err);
                alert('Failed to save rating');
            }
        }

        // CREATE RECIPE
        async function submitRecipe() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const estimated_time = document.getElementById('estimated_time').value.trim();

            const token = localStorage.getItem('token');

            try {
                const res = await fetch('http://localhost:3000/recipes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ title, description, estimated_time })
                });

                const msg = await res.json();
                const box = document.getElementById('formMessage');

                if (res.ok) {
                    box.className = 'success';
                    box.innerText = msg.message;
                    document.getElementById('recipeForm').reset();
                    document.getElementById('createForm').style.display = 'none';
                    loadFeed();
                } else {
                    box.className = 'error';
                    box.innerText = msg.error;
                }

            } catch (err) {
                console.error(err);
                alert('Server error');
            }
        }

        // EDIT REDIRECT
        function editRecipe(id) {
            window.location.href = `editRecipe.html?id=${id}`;
        }
    </script>

</body>

</html>
