<!DOCTYPE html>
<html>

<head>
    <title>My Recipes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

     <nav>
        <div>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
        <a href="favorites.html">Favorites</a>
        <a href="community.html">Community</a>
    </div>

    <div id="profile-menu">
        <button id="profile-btn" onclick="window.location.href='profile.html'">
            Account Settings
        </button>
    </div>
    </nav>

    <div class="container">

        <h1>My Recipes</h1>
        <button id="showCreate">Create Recipe</button>

        <!-- Create Form -->
        <div id="createForm" class="card" style="display:none; margin-top:20px;">
            <h3>New Recipe</h3>
            <form id="recipeForm" enctype="multipart/form-data">
                <label>Title (max 25):</label><br>
                <input type="text" id="title" maxlength="25" required><br>

                <label>Description (max 150):</label><br>
                <textarea id="description" maxlength="150" rows="4" required></textarea><br>

                <label>Estimated Time:</label><br>
                <input type="text" id="estimated_time" name="estimated_time"><br>

                <label>Picture (optional):</label><br>
                <input type="file" id="image" name="image" accept="image/*"><br>
                <div id="imagePreview" style="margin-top: 10px;"></div>

                <br>
                <button type="submit">Submit</button>
                <button type="button" id="cancelCreate">Cancel</button>
            </form>
            <p id="formMessage"></p>
        </div>

        <div id="feed"></div>

    </div>

    <script src="auth.js"></script>

    <script>
        let editingRecipeId = null;

        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
            loadFeed();

            const showBtn = document.getElementById('showCreate');
            const createForm = document.getElementById('createForm');
            const cancelBtn = document.getElementById('cancelCreate');
            const formTitle = createForm.querySelector('h3');
            const submitBtn = document.querySelector('#recipeForm button[type="submit"]');
            const imagePreview = document.getElementById('imagePreview');

            if (!showBtn) console.error("showCreate button missing!");
            if (!createForm) console.error("createForm element missing!");
            if (!cancelBtn) console.error("cancelCreate button missing!");

            function resetForm() {
                document.getElementById('recipeForm').reset();
                imagePreview.innerHTML = '';
                editingRecipeId = null;
                formTitle.textContent = 'New Recipe';
                submitBtn.textContent = 'Submit';
            }

            showBtn.onclick = () => {
                resetForm();
                createForm.style.display = 'block';
            };
            cancelBtn.onclick = () => {
                createForm.style.display = 'none';
                resetForm();
            };

            document.getElementById('recipeForm').onsubmit = async (e) => {
                e.preventDefault();
                await submitRecipe();
            };

            const imageInput = document.getElementById('image');
            imageInput.addEventListener('change', () => {
                const file = imageInput.files[0];
                if (!file) {
                    imagePreview.innerHTML = '';
                    return;
                }
                imagePreview.innerHTML = `<p><strong>Selected:</strong> ${file.name}</p>`;
            });

            window.editRecipe = async (id) => {
                try {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        alert('You must be logged in to edit a recipe.');
                        return;
                    }

                    const res = await fetch(`http://localhost:3000/recipes/${id}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        alert(data.error || 'Unable to load recipe for editing.');
                        return;
                    }

                    editingRecipeId = id;
                    formTitle.textContent = 'Edit Recipe';
                    submitBtn.textContent = 'Update';
                    createForm.style.display = 'block';

                    document.getElementById('title').value = data.title || '';
                    document.getElementById('description').value = data.description || '';
                    document.getElementById('estimated_time').value = data.estimated_time || '';
                    document.getElementById('image').value = '';

                    if (data.image_url) {
                        imagePreview.innerHTML = `<div><strong>Current Photo:</strong><br><img src="${data.image_url}" alt="Current recipe photo" style="max-width:200px; max-height:200px; display:block; margin-top:5px;" /></div>`;
                    } else {
                        imagePreview.innerHTML = '<p><em>No Picture Uploaded</em></p>';
                    }
                } catch (err) {
                    console.error('Load recipe for edit failed', err);
                    alert('Failed to load recipe for editing.');
                }
            };
        });

        // Load recipes from the backend and render them in the feed
        async function loadFeed() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('http://localhost:3000/recipes/my', {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                const recipes = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                if (!res.ok) {
                    const data = await res.json().catch(() => ({ error: 'Failed to load recipes' }));
                    alert('Error loading recipes: ' + (data.error || 'Unknown error'));
                    return;
                }

                if (recipes.length === 0) {
                    feed.innerHTML = '<p>You have not posted any recipes yet. Click "Create Recipe" to share your first recipe!</p>';
                    return;
                }

                recipes.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let inner = `<h3>${r.title}</h3>`;

                    const imageUrl = r.image_url;

                    if (imageUrl) {
                        inner += `<img src="${imageUrl}" alt="Recipe image" style="max-width:200px; max-height:200px; display:block; margin-bottom:10px;" />`;
                    } else {
                        inner += `<p><em>No Picture Uploaded</em></p>`;
                    }

                    inner += `<p>${r.description}</p>`;
                    if (r.estimated_time) inner += `<p><strong>Time:</strong> ${r.estimated_time}</p>`;
                    inner += `<p><strong>Author:</strong> ${r.author || 'You'}</p>`;
                    inner += `<p><strong>Published:</strong> ${formatTimeAgo(r.created_at)}</p>`;
                    if (r.updated_at && new Date(r.updated_at).getTime() !== new Date(r.created_at).getTime()) {
                        inner += `<p><strong>Updated:</strong> ${formatTimeAgo(r.updated_at)}</p>`;
                    }
                    inner += `<p><strong>Rating:</strong> ${Number(r.average_rating).toFixed(1)} ⭐</p>`;
                    inner += `<p><strong>Comments:</strong> ${r.comment_count}</p>`;
                    inner += `<button onclick="commentRecipe(${r.id})">Comment</button> `;
                    inner += `<button onclick="rateRecipe(${r.id})">Rate</button> `;
                    inner += `<button onclick="editRecipe(${r.id})">Edit</button>`;
                    card.innerHTML = inner;
                    feed.appendChild(card);

                    // Comments are not loaded on this page - users can click Comment to go to community
                });

            } catch (err) {
                console.error('Load feed error', err);
            }
        }

        function formatTimeAgo(value) {
            if (!value) return '';

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';

            // Compute MST time (UTC-7) to keep relative times consistent regardless of the user's local timezone
            const msOffset = 7 * 60 * 60 * 1000; // 7 hours
            const nowMst = Date.now() - msOffset;
            const dateMst = date.getTime() - msOffset;

            const seconds = Math.floor((nowMst - dateMst) / 1000);

            if (seconds < 60) {
                return `${seconds} second${seconds !== 1 ? 's' : ''} ago`;
            }

            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) {
                return `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
            }

            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            }

            const days = Math.floor(hours / 24);
            return `${days} day${days !== 1 ? 's' : ''} ago`;
        }

        // Prompt user for a comment and send it to the API
        async function commentRecipe(id) {
            const text = prompt('Enter your comment:');
            if (!text || !text.trim()) return;

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to comment.');
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ comment_text: text.trim() })
                });

                if (res.ok) {
                    alert('Comment posted!');
                    loadFeed(); // refresh everything
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to post comment');
                }

            } catch (err) {
                console.error(err);
                alert('Failed to post comment');
            }
        }

        // RATE
        async function rateRecipe(id) {
            const ratingStr = prompt('Rate this recipe (1-5):');
            if (!ratingStr) return;

            const rating = Number(ratingStr);
            if (!Number.isInteger(rating) || rating < 1 || rating > 5) {
                alert('Enter a number 1-5');
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/ratings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ rating })
                });

                if (res.ok) {
                    alert('Rating saved!');
                    loadFeed();
                }

            } catch (err) {
                console.error(err);
                alert('Failed to save rating');
            }
        }

        // CREATE RECIPE
        async function submitRecipe() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const estimated_time = document.getElementById('estimated_time').value.trim();
            const imageInput = document.getElementById('image');

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to create a recipe.');
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('description', description);
            formData.append('estimated_time', estimated_time);
            if (imageInput.files[0]) {
                formData.append('image', imageInput.files[0]);
            }

            const url = editingRecipeId ? `http://localhost:3000/recipes/${editingRecipeId}` : 'http://localhost:3000/recipes';
            const method = editingRecipeId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });

                const messageBox = document.getElementById('formMessage');
                let msg;
                try {
                    msg = await res.json();
                } catch (jsonErr) {
                    console.error('Response was not JSON:', jsonErr);
                    msg = { error: 'Server returned an invalid response. Please try again.' };
                }

                if (res.ok) {
                    alert('Recipe created successfully');
                    document.getElementById('recipeForm').reset();
                    document.getElementById('createForm').style.display = 'none';
                    editingRecipeId = null;
                    loadFeed();
                } else {
                    const errorText = msg.error || msg.message || `Request failed (${res.status})`;
                    alert('Error creating recipe: ' + errorText);
                }

            } catch (err) {
                console.error(err);
                alert('Server error');
            }
        }

        // EDIT REDIRECT
        function editRecipe(id) {
            window.location.href = `editRecipe.html?id=${id}`;
        }
    </script>

</body>

</html>
