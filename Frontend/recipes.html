<!DOCTYPE html>
<html>

<head>
    <title>My Recipes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
            <a href="favorites.html">Favorites</a>
            <a href="community.html">Community</a>
            <a href="calendar.html">Calendar</a>
            <a href="aboutus.html">About Us</a>
        </div>

       <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <div class="container">
        <h1>My Recipes</h1>

        <button id="showCreate" class="recipe-section-btn">🍋 Upload Recipe 🍋</button>
        <input type="text" id="recipe-search" placeholder="Search recipes..." onkeyup="filterRecipes()">

        <div id="createForm" class="card" style="display:none;">
            <form id="recipeForm" enctype="multipart/form-data">
                <input type="text" id="title" placeholder="Title" required>
                <textarea id="description" placeholder="Description" required></textarea>
                <input type="text" id="estimated_time" placeholder="Estimated Time">

                <h4>Ingredients</h4>
                <div id="ingredientsContainer"></div>
                <button type="button" id="addIngredientBtn" class="recipe-section-btn">+ Add Ingredient</button>

                <h4>Instructions</h4>
                <textarea id="instructions" required></textarea>

                <input type="file" id="image" accept="image/*">
                <div id="imagePreview"></div>

                <button type="submit" class="recipe-section-btn">Submit</button>
                <button type="button" id="cancelCreate" class="recipe-section-btn" style="background-color: #6c757d;">Cancel</button>
            </form>
        </div>

        <div id="feed"></div>
    </div>

      </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text" placeholder="Start typing..."></textarea>
            <button id="save-shopping-btn" class="save-list-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="calendar.js"></script>
    <script src="shopping.js"></script>

    <div class="zestify-corner-logo">
    <img src="../uploads/Zestify.png" alt="Zestify Logo">
</div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        const token = localStorage.getItem("token");

        /* ---------------- HELPERS ---------------- */
        function escapeHtml(text) {
            return text ? text.replace(/[&<>"']/g, m => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[m])) : '';
        }

        function toggleSection(btn) {
            btn.nextElementSibling.classList.toggle('hidden');
        }

        /* ---------------- INGREDIENT ROWS ---------------- */
        function addIngredientRow(name = '', amount = '') {
            const row = document.createElement('div');
            row.className = 'ingredient-row';

            row.innerHTML = `
                <input class="ingredient-name" placeholder="Ingredient" value="${escapeHtml(name)}">
                <input class="ingredient-amount" placeholder="Amount" value="${escapeHtml(amount)}">
                <button type="button" style="background:none; border:none; color:red; cursor:pointer;">X</button>
            `;

            row.querySelector('button').onclick = () => row.remove();
            ingredientsContainer.appendChild(row);
        }

        addIngredientBtn.onclick = () => addIngredientRow();

        /* ---------------- IMAGE PREVIEW ---------------- */
        image.addEventListener('change', function () {
            imagePreview.innerHTML = '';
            if (!this.files[0]) return;

            const img = document.createElement('img');
            img.src = URL.createObjectURL(this.files[0]);
            img.style.maxWidth = '200px';
            imagePreview.appendChild(img);
        });

        /* ---------------- CREATE RECIPE ---------------- */
        recipeForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const ingredients = [...document.querySelectorAll('.ingredient-row')].map(row => ({
                name: row.querySelector('.ingredient-name').value,
                amount: row.querySelector('.ingredient-amount').value
            }));

            const formData = new FormData();
            formData.append('title', title.value);
            formData.append('description', description.value);
            formData.append('estimated_time', estimated_time.value);
            formData.append('instructions', instructions.value);
            formData.append('ingredients', JSON.stringify(ingredients));

            if (image.files[0]) formData.append('image', image.files[0]);

            const res = await fetch(API_BASE_URL + '/recipes', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}` },
                body: formData
            });

            if (res.ok) {
                loadFeed();
                createForm.style.display = 'none';
                recipeForm.reset();
                imagePreview.innerHTML = '';
                ingredientsContainer.innerHTML = '';
            }
        });

        /* ---------------- LOAD FEED ---------------- */
        async function loadFeed() {
            const res = await fetch(API_BASE_URL + '/recipes/my', {
                headers: { Authorization: `Bearer ${token}` }
            });

            const recipes = await res.json();

            feed.innerHTML = '';
            recipes.forEach(r => feed.appendChild(buildCard(r)));
        }

        /* ---------------- BUILD CARD ---------------- */
        function buildCard(r) {
            const card = document.createElement('div');
            card.className = 'card';

            const imageSrc = r.image_url || '/uploads/placeholder.png';
            const imageHtml = `<img src="${API_BASE_URL}${imageSrc}" style="max-width:200px;">`;

            card.innerHTML = `
                <h3>${escapeHtml(r.title)}</h3>
                ${imageHtml}
                <p>${escapeHtml(r.description)}</p>
                <p><strong>Time:</strong> ${escapeHtml(r.estimated_time || '')}</p>

                <button class="recipe-section-btn" onclick="toggleSection(this)">Ingredients</button>
                <div class="section-content hidden">
                    ${(r.ingredients || []).map(i => `${escapeHtml(i.amount)} ${escapeHtml(i.name)}`).join('<br>')}
                </div>

                <button class="recipe-section-btn" onclick="toggleSection(this)">Instructions</button>
                <div class="section-content hidden">${escapeHtml(r.instructions || '')}</div>
            `;

            const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            const isFavorited = favorites.some(f => f.id === r.id);

            const favBtn = document.createElement('button');
            favBtn.className = 'favorite-heart';
            favBtn.textContent = isFavorited ? '❤️' : '🤍';
            favBtn.onclick = (event) => toggleFavorite(r, event);
            card.appendChild(favBtn);

            const actions = document.createElement('div');
            actions.className = 'recipe-actions';

            /* EDIT */
            const editBtn = document.createElement('button');
            editBtn.className = 'recipe-section-btn';
            editBtn.textContent = 'Edit';
            editBtn.onclick = () => {
                window.location.href = `editRecipe.html?id=${r.id}`;
            };
            actions.appendChild(editBtn);

            /* DELETE */
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'recipe-section-btn';
            deleteBtn.textContent = 'Delete';
            deleteBtn.style.backgroundColor = '#ff6b6b'; // Keep it red for warning
            deleteBtn.onclick = () => deleteRecipe(r.id);
            actions.appendChild(deleteBtn);

            /* RATE */
            const rateBtn = document.createElement('button');
            rateBtn.className = 'recipe-section-btn';
            rateBtn.textContent = 'Rate';
            rateBtn.onclick = () => rateRecipe(r.id);
            actions.appendChild(rateBtn);

            card.appendChild(actions);

            return card;
        }

        /* ---------------- FAVORITES ---------------- */
        function toggleFavorite(recipe, event) {
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            const index = favorites.findIndex(f => f.id === recipe.id);

            if (index !== -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(recipe);
            }

            localStorage.setItem('favorites', JSON.stringify(favorites));
            const favBtn = event.target;
            const isNowFavorited = favorites.some(f => f.id === recipe.id);
            favBtn.textContent = isNowFavorited ? '❤️' : '🤍';
        }

        /* ---------------- DELETE ---------------- */
        async function deleteRecipe(id) {
            if (!confirm("Delete this recipe?")) return;

            await fetch(`${API_BASE_URL}/recipes/${id}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${token}` }
            });

            loadFeed();
        }

        /* ---------------- RATE ---------------- */
        async function rateRecipe(id) {
            const rating = prompt("Rate 1-5:");
            if (!rating) return;

            await fetch(`${API_BASE_URL}/recipes/${id}/ratings`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ rating })
            });
        }

        /* ---------------- SEARCH ---------------- */
        function filterRecipes() {
            const value = document.getElementById('recipe-search').value.toLowerCase();
            document.querySelectorAll('#feed .card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(value) ? '' : 'none';
            });
        }

        /* ---------------- TOGGLE FORM ---------------- */
        showCreate.onclick = () => createForm.style.display = 'block';
        cancelCreate.onclick = () => createForm.style.display = 'none';

        /* ---------------- INIT ---------------- */
        document.addEventListener('DOMContentLoaded', loadFeed);
    </script>

</body>

</html>
