<!DOCTYPE html>
<html>

<head>
    <title>My Recipes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
            <a href="favorites.html">Favorites</a>
            <a href="community.html">Community</a>
            <a href="calendar.html">Calendar</a>
            <a href="aboutus.html">About Us</a>
        </div>

        <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <div class="container">

        <h1>My Recipes</h1>

        <div class="card" style="margin-bottom:20px;">
            <h3>Filter Recipes</h3>
            <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
                <div>
                    <label for="timeFilter">Estimated Time</label><br>
                    <select id="timeFilter">
                        <option value="">All</option>
                        <option value="0-5">0-5 minutes</option>
                        <option value="5-15">5-15 minutes</option>
                        <option value="15-45">15-45 minutes</option>
                        <option value="45+">45-60+ minutes</option>
                    </select>
                </div>

                <div>
                    <label for="ratingFilter">Rating</label><br>
                    <select id="ratingFilter">
                        <option value="">All</option>
                        <option value="0-1">0-1 stars</option>
                        <option value="2-3">2-3 stars</option>
                        <option value="4-5">4-5 stars</option>
                    </select>
                </div>

                <div>
                    <label for="commentFilter">Comments</label><br>
                    <select id="commentFilter">
                        <option value="">All</option>
                        <option value="has_comments">Has comments</option>
                        <option value="no_comments">No comments</option>
                    </select>
                </div>

                <div>
                    <button id="applyFilters" type="button">Apply Filters</button>
                    <button id="clearFilters" type="button">Clear</button>
                </div>
            </div>
        </div>

        <button id="showCreate">🍋 Upload Recipe 🍋</button>



        <div class="nav-search" style="margin-bottom: 20px;">
            <input type="text" id="recipe-search" placeholder="Search your recipes..." onkeyup="filterRecipes()"
                style="width: 100%; padding: 10px;">
        </div>

        <!-- Create Form -->
        <div id="createForm" class="card" style="display:none; margin-top:20px;">
            <h3>New Recipe</h3>
            <form id="recipeForm" enctype="multipart/form-data">
                <label>Title (max 25):</label><br>
                <input type="text" id="title" maxlength="25" required><br>

                <label>Description (max 150):</label><br>
                <textarea id="description" maxlength="150" rows="4" required></textarea><br>

                <label>Estimated Time:</label><br>
                <input type="text" id="estimated_time" name="estimated_time"><br>

                <label>Picture (optional):</label><br>
                <input type="file" id="image" name="image" accept="image/*"><br>
                <div id="imagePreview" style="margin-top: 10px;"></div>

                <br>
                <button type="submit">Submit</button>
                <button type="button" id="cancelCreate">Cancel</button>
            </form>
            <p id="formMessage"></p>
        </div>

        <div id="feed" class="recipes-feed"></div>

        <div id="commentModal" class="modal-overlay hidden" aria-hidden="true">
            <div class="modal-content">
                <button class="modal-close" onclick="closeCommentModal()">×</button>
                <h3 id="commentModalTitle">Comments</h3>
                <div id="commentList" class="comment-list"></div>
                <textarea id="commentInput" placeholder="Write your comment..." maxlength="500"></textarea>
                <button id="commentSubmitButton" onclick="submitComment()">Post Comment</button>
            </div>
        </div>

    </div>
    <script src="auth.js"></script>

    <script>
        let editingRecipeId = null;
        let activeFilters = { time: '', rating: '', comments: '' };
        const RECIPES_UPDATED_KEY = 'recipes_last_updated';
        const API_BASE_URL = 'http://localhost:3000';

        function resolveImageUrl(imageUrl) {
            if (!imageUrl) return '';
            if (/^https?:\/\//i.test(imageUrl)) return imageUrl;
            return `${API_BASE_URL}${imageUrl.startsWith('/') ? imageUrl : `/${imageUrl}`}`;
        }

        function notifyRecipesUpdated() {
            localStorage.setItem(RECIPES_UPDATED_KEY, Date.now().toString());
        }

        function refreshRecipesFeed() {
            loadFeed(activeFilters.time, activeFilters.rating, activeFilters.comments);
        }

        function setupLiveRecipeRefresh() {
            window.addEventListener('storage', (event) => {
                if (event.key === RECIPES_UPDATED_KEY) {
                    refreshRecipesFeed();
                }
            });

            window.addEventListener('pageshow', (event) => {
                if (event.persisted) {
                    refreshRecipesFeed();
                }
            });
        }


        //search feature for recipes - filters the displayed recipe cards based on the search input
        function filterRecipes() {
            const input = document.getElementById('recipe-search').value.toLowerCase();
            const cards = document.querySelectorAll('#feed .card');

            cards.forEach(card => {
                const content = card.innerText.toLowerCase();

                if (content.includes(input)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
            setupLiveRecipeRefresh();
            refreshRecipesFeed();

            const showBtn = document.getElementById('showCreate');
            const createForm = document.getElementById('createForm');
            const cancelBtn = document.getElementById('cancelCreate');
            const formTitle = createForm.querySelector('h3');
            const submitBtn = document.querySelector('#recipeForm button[type="submit"]');
            const imagePreview = document.getElementById('imagePreview');
            const timeFilterEl = document.getElementById('timeFilter');
            const ratingFilterEl = document.getElementById('ratingFilter');
            const commentFilterEl = document.getElementById('commentFilter');
            const applyFiltersBtn = document.getElementById('applyFilters');
            const clearFiltersBtn = document.getElementById('clearFilters');

            if (!showBtn) console.error("showCreate button missing!");
            if (!createForm) console.error("createForm element missing!");
            if (!cancelBtn) console.error("cancelCreate button missing!");

            applyFiltersBtn.addEventListener('click', () => {
                activeFilters.time = timeFilterEl.value;
                activeFilters.rating = ratingFilterEl.value;
                activeFilters.comments = commentFilterEl.value;
                loadFeed(activeFilters.time, activeFilters.rating, activeFilters.comments);
            });

            clearFiltersBtn.addEventListener('click', () => {
                timeFilterEl.value = '';
                ratingFilterEl.value = '';
                commentFilterEl.value = '';
                activeFilters = { time: '', rating: '', comments: '' };
                loadFeed();
            });

            function resetForm() {
                document.getElementById('recipeForm').reset();
                imagePreview.innerHTML = '';
                editingRecipeId = null;
                formTitle.textContent = 'New Recipe';
                submitBtn.textContent = 'Submit';
            }

            showBtn.onclick = () => {
                resetForm();
                createForm.style.display = 'block';
            };
            cancelBtn.onclick = () => {
                createForm.style.display = 'none';
                resetForm();
            };

            document.getElementById('recipeForm').onsubmit = async (e) => {
                e.preventDefault();
                await submitRecipe();
            };

            const imageInput = document.getElementById('image');
            imageInput.addEventListener('change', () => {
                const file = imageInput.files[0];
                if (!file) {
                    imagePreview.innerHTML = '';
                    return;
                }
                imagePreview.innerHTML = `<p><strong>Selected:</strong> ${file.name}</p>`;
            });

            window.editRecipe = async (id) => {
                try {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        alert('You must be logged in to edit a recipe.');
                        return;
                    }

                    const res = await fetch(`http://localhost:3000/recipes/${id}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        alert(data.error || 'Unable to load recipe for editing.');
                        return;
                    }

                    editingRecipeId = id;
                    formTitle.textContent = 'Edit Recipe';
                    submitBtn.textContent = 'Update';
                    createForm.style.display = 'block';

                    document.getElementById('title').value = data.title || '';
                    document.getElementById('description').value = data.description || '';
                    document.getElementById('estimated_time').value = data.estimated_time || '';
                    document.getElementById('image').value = '';

                    if (data.image_url) {
                        imagePreview.innerHTML = `<div><strong>Current Photo:</strong><br><img src="${resolveImageUrl(data.image_url)}" alt="Current recipe photo" style="max-width:200px; max-height:200px; display:block; margin-top:5px;" /></div>`;
                    } else {
                        imagePreview.innerHTML = '<p><em>No Picture Uploaded</em></p>';
                    }
                } catch (err) {
                    console.error('Load recipe for edit failed', err);
                    alert('Failed to load recipe for editing.');
                }
            };
        });

        // Load recipes from the backend and render them in the feed
        async function loadFeed(timeFilter = '', ratingFilter = '', commentFilter = '') {
            try {
                const token = localStorage.getItem('token');
                const params = new URLSearchParams({ _: Date.now().toString() });
                if (timeFilter) params.set('time_filter', timeFilter);
                if (ratingFilter) params.set('rating_filter', ratingFilter);
                if (commentFilter) params.set('comment_filter', commentFilter);
                const res = await fetch(`http://localhost:3000/recipes/my?${params.toString()}`, {
                    cache: 'no-store',
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                const recipes = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                if (!res.ok) {
                    const data = await res.json().catch(() => ({ error: 'Failed to load recipes' }));
                    alert('Error loading recipes: ' + (data.error || 'Unknown error'));
                    return;
                }

                if (recipes.length === 0) {
                    const filtersActive = timeFilter || ratingFilter || commentFilter;
                    feed.innerHTML = filtersActive
                        ? '<p>No recipes found. Click "Upload Recipe" to share your first recipe!</p>'
                        : '<p>You have not posted any recipes yet. Click "Upload Recipe" to share your first recipe!</p>';
                    return;
                }

                recipes.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.recipeId = r.id;

                    let inner = `<h3>${r.title}</h3>`;

                    const imageUrl = resolveImageUrl(r.image_url);

                    if (imageUrl) {
                        inner += `<img src="${imageUrl}" alt="Recipe image" style="max-width:200px; max-height:200px; display:block; margin-bottom:10px;" />`;
                    } else {
                        inner += `<p><em>No Picture Uploaded</em></p>`;
                    }

                    inner += `<p>${r.description}</p>`;
                    if (r.estimated_time) inner += `<p><strong>Time:</strong> ${r.estimated_time}</p>`;
                    inner += `<p><strong>Author:</strong> ${r.author || 'You'}</p>`;
                    inner += `<p><strong>Published:</strong> ${formatTimeAgo(r.created_at)}</p>`;
                    if (r.updated_at && new Date(r.updated_at).getTime() !== new Date(r.created_at).getTime()) {
                        inner += `<p><strong>Updated:</strong> ${formatTimeAgo(r.updated_at)}</p>`;
                    }
                    inner += `<p><strong>Rating:</strong> ${Number(parseFloat(r.average_rating) || 0).toFixed(1)} ⭐</p>`;
                    inner += `<p><strong>Comments:</strong> <span class="comment-count">${r.comment_count}</span></p>`;
                    card.innerHTML = inner;

                    const commentBtn = document.createElement('button');
                    commentBtn.textContent = 'Comment';
                    commentBtn.addEventListener('click', () => showCommentModal(r.id, r.title));
                    card.appendChild(commentBtn);

                    const rateBtn = document.createElement('button');
                    rateBtn.textContent = 'Rate';
                    rateBtn.addEventListener('click', () => rateRecipe(r.id));
                    card.appendChild(rateBtn);

                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.addEventListener('click', () => editRecipe(r.id));
                    card.appendChild(editBtn);

                    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                    const isFavorited = favorites.some(f => f.id === r.id);

                    const favBtn = document.createElement('button');
                    favBtn.className = 'favorite-heart';
                    favBtn.textContent = isFavorited ? '❤️' : '🤍';
                    favBtn.addEventListener('click', () => favoriteRecipe(r));
                    card.appendChild(favBtn);

                    feed.appendChild(card);

                    // Comments are not loaded on this page - users can click Comment to go to community
                });

            } catch (err) {
                console.error('Load feed error', err);
            }
        }

        function formatTimeAgo(value) {
            if (!value) return '';

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';

            const minutes = Math.floor((Date.now() - date.getTime()) / 60000);

            if (minutes <= 0) {
                return '0 minutes ago';
            }
            if (minutes < 60) {
                return `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
            }

            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            }

            const days = Math.floor(hours / 24);
            return `${days} day${days !== 1 ? 's' : ''} ago`;
        }

        // Prompt user for a comment and send it to the API
        let activeCommentRecipeId = null;

        async function showCommentModal(id, recipeTitle) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to comment.');
                return;
            }

            activeCommentRecipeId = id;
            const modal = document.getElementById('commentModal');
            const title = document.getElementById('commentModalTitle');
            const list = document.getElementById('commentList');
            const input = document.getElementById('commentInput');

            title.textContent = `Comments for: ${recipeTitle}`;
            list.innerHTML = '<p>Loading comments...</p>';
            input.value = '';
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/comments`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) {
                    list.innerHTML = `<p>Error loading comments (${res.status})</p>`;
                    return;
                }

                const comments = await res.json();
                if (!comments.length) {
                    list.innerHTML = '<p>No comments yet. Be the first.</p>';
                    updateCommentCounter(id, 0);
                    return;
                }

                list.innerHTML = comments.map(c => {
                    const when = formatTimeAgo(c.created_at || c.createdAt || c.createdAt);
                    const author = c.author || 'Anonymous';
                    return `<div class="comment-item"><strong>${author}</strong> <em>${when}</em><p>${c.comment_text || c.comment}</p></div>`;
                }).join('');

                updateCommentCounter(id, comments.length);

            } catch (err) {
                console.error('Failed to load comments', err);
                list.innerHTML = '<p>Failed to load comments.</p>';
            }
        }

        function updateCommentCounter(recipeId, count) {
            const card = document.querySelector(`.card[data-recipe-id="${recipeId}"]`);
            if (!card) return;
            const counter = card.querySelector('.comment-count');
            if (counter) counter.textContent = count;
        }

        async function submitComment() {
            const commentInput = document.getElementById('commentInput');
            const comment = commentInput.value.trim();
            if (!comment) {
                alert('Please write a comment first.');
                return;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to post comments.');
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/recipes/${activeCommentRecipeId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ comment_text: comment })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(err.error || 'Failed to post comment');
                    return;
                }

                commentInput.value = '';
                await showCommentModal(activeCommentRecipeId);
            } catch (err) {
                console.error('Failed to submit comment', err);
                alert('Failed to submit comment');
            }
        }

        function closeCommentModal() {
            const modal = document.getElementById('commentModal');
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
        }

        // RATE
        async function rateRecipe(id) {
            const ratingStr = prompt('Rate this recipe (1-5):');
            if (!ratingStr) return;

            const rating = Number(ratingStr);
            if (!Number.isInteger(rating) || rating < 1 || rating > 5) {
                alert('Enter a number 1-5');
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const res = await fetch(`http://localhost:3000/recipes/${id}/ratings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ rating })
                });

                if (res.ok) {
                    alert('Rating saved!');
                    notifyRecipesUpdated();
                    refreshRecipesFeed();
                }

            } catch (err) {
                console.error(err);
                alert('Failed to save rating');
            }
        }

        // CREATE RECIPE
        async function submitRecipe() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const estimated_time = document.getElementById('estimated_time').value.trim();
            const imageInput = document.getElementById('image');

            const token = localStorage.getItem('token');
            if (!token) {
                alert('You must be logged in to create a recipe.');
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('description', description);
            formData.append('estimated_time', estimated_time);
            if (imageInput.files[0]) {
                formData.append('image', imageInput.files[0]);
            }

            const url = editingRecipeId ? `http://localhost:3000/recipes/${editingRecipeId}` : 'http://localhost:3000/recipes';
            const method = editingRecipeId ? 'PUT' : 'POST';
            const successMessage = editingRecipeId ? 'Recipe updated successfully!' : 'Recipe created successfully';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });

                const messageBox = document.getElementById('formMessage');
                let msg;
                try {
                    msg = await res.json();
                } catch (jsonErr) {
                    console.error('Response was not JSON:', jsonErr);
                    msg = { error: 'Server returned an invalid response. Please try again.' };
                }

                if (res.ok) {
                    alert(successMessage);
                    document.getElementById('recipeForm').reset();
                    document.getElementById('createForm').style.display = 'none';
                    editingRecipeId = null;
                    notifyRecipesUpdated();
                    refreshRecipesFeed();
                } else {
                    const errorText = msg.error || msg.message || `Request failed (${res.status})`;
                    alert('Error creating recipe: ' + errorText);
                }

            } catch (err) {
                console.error(err);
                alert('Server error');
            }
        }

        function favoriteRecipe(recipe) {
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

            const existingIndex = favorites.findIndex(f => f.id === recipe.id);

            if (existingIndex !== -1) {
                // remove if already favorited
                favorites.splice(existingIndex, 1);
                alert("Removed from favorites");
            } else {
                favorites.push(recipe);
                alert("Added to favorites ❤️");
            }

            localStorage.setItem('favorites', JSON.stringify(favorites));

            loadFeed(); // refresh hearts
        }
        // EDIT REDIRECT
        function editRecipe(id) {
            window.location.href = `editRecipe.html?id=${id}`;
        }
    </script>

    <div class="zestify-corner-logo">
        <img src="../uploads/Zestify.png" alt="Zestify Logo">
    </div>

</body>

</html>
